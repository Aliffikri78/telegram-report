<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:24px;max-width:1100px}
    .section{border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    input,select{padding:8px;border:1px solid #ccc;border-radius:6px}
    button{background:#0d6efd;color:white;border:none;border-radius:6px;padding:8px 10px;cursor:pointer}
    button.danger{background:#b42318}
    table{border-collapse:collapse;width:100%}
    th,td{border-bottom:1px solid #eee;text-align:left;padding:8px}
    h2{margin-top:0}
  </style>
</head>
<body>
  <p><a href="/">Report Builder</a></p>
  <h2>Settings</h2>

  <div class="section" data-entity="companies">
    <h3>Companies</h3>
    <form class="row create-form">
      <input name="name" placeholder="Company name" required>
      <button type="submit">Add</button>
    </form>
    <table><tbody>
      {% for company in companies %}
      <tr data-id="{{company.id}}"><td><input name="name" value="{{company.name}}"></td><td><button class="save">Save</button> <button class="danger delete">Delete</button></td></tr>
      {% endfor %}
    </tbody></table>
  </div>

  <div class="section" data-entity="projects">
    <h3>Projects</h3>
    <form class="row create-form">
      <select name="company_id">{% for company in companies %}<option value="{{company.id}}">{{company.name}}</option>{% endfor %}</select>
      <input name="name" placeholder="Project name" required>
      <input name="slug" placeholder="slug">
      <button type="submit">Add</button>
    </form>
    <table><tbody>
      {% for project in projects %}
      <tr data-id="{{project.id}}">
        <td><select name="company_id">{% for company in companies %}<option value="{{company.id}}" {% if company.id == project.company_id %}selected{% endif %}>{{company.name}}</option>{% endfor %}</select></td>
        <td><input name="name" value="{{project.name}}"></td>
        <td><input name="slug" value="{{project.slug}}"></td>
        <td><button class="save">Save</button> <button class="danger delete">Delete</button></td>
      </tr>
      {% endfor %}
    </tbody></table>
  </div>

  <div class="section" data-entity="sites">
    <h3>Sites</h3>
    <form class="row create-form">
      <select name="project_id">{% for project in projects %}<option value="{{project.id}}">{{project.name}}</option>{% endfor %}</select>
      <input name="name" placeholder="Site name" required>
      <input name="slug" placeholder="slug">
      <input name="aliases" placeholder="aliases, comma separated">
      <button type="submit">Add</button>
    </form>
    <table><tbody>
      {% for site in sites %}
      <tr data-id="{{site.id}}">
        <td><select name="project_id">{% for project in projects %}<option value="{{project.id}}" {% if project.id == site.project_id %}selected{% endif %}>{{project.name}}</option>{% endfor %}</select></td>
        <td><input name="name" value="{{site.name}}"></td>
        <td><input name="slug" value="{{site.slug}}"></td>
        <td><input name="aliases" value="{{site.aliases_text}}"></td>
        <td><button class="save">Save</button> <button class="danger delete">Delete</button></td>
      </tr>
      {% endfor %}
    </tbody></table>
  </div>

  <div class="section" data-entity="categories">
    <h3>Categories</h3>
    <form class="row create-form">
      <select name="project_id">{% for project in projects %}<option value="{{project.id}}">{{project.name}}</option>{% endfor %}</select>
      <input name="name" placeholder="Category name" required>
      <input name="slug" placeholder="slug">
      <button type="submit">Add</button>
    </form>
    <table><tbody>
      {% for category in categories %}
      <tr data-id="{{category.id}}">
        <td><select name="project_id">{% for project in projects %}<option value="{{project.id}}" {% if project.id == category.project_id %}selected{% endif %}>{{project.name}}</option>{% endfor %}</select></td>
        <td><input name="name" value="{{category.name}}"></td>
        <td><input name="slug" value="{{category.slug}}"></td>
        <td><button class="save">Save</button> <button class="danger delete">Delete</button></td>
      </tr>
      {% endfor %}
    </tbody></table>
  </div>

  <div class="section" data-entity="tasks">
    <h3>Tasks</h3>
    <form class="row create-form">
      <select name="category_id">{% for category in categories %}<option value="{{category.id}}">{{category.project_name}} / {{category.name}}</option>{% endfor %}</select>
      <input name="name" placeholder="Task name" required>
      <input name="slug" placeholder="folder slug">
      <input name="command" placeholder="telegram command">
      <input name="title" placeholder="report title">
      <button type="submit">Add</button>
    </form>
    <table><tbody>
      {% for task in tasks %}
      <tr data-id="{{task.id}}">
        <td><select name="category_id">{% for category in categories %}<option value="{{category.id}}" {% if category.id == task.category_id %}selected{% endif %}>{{category.project_name}} / {{category.name}}</option>{% endfor %}</select></td>
        <td><input name="name" value="{{task.name}}"></td>
        <td><input name="slug" value="{{task.slug}}"></td>
        <td><input name="command" value="{{task.command or ''}}"></td>
        <td><input name="title" value="{{task.title or ''}}"></td>
        <td><button class="save">Save</button> <button class="danger delete">Delete</button></td>
      </tr>
      {% endfor %}
    </tbody></table>
  </div>

<script>
function rowData(root){
  const data = {};
  root.querySelectorAll('input,select').forEach(el => data[el.name] = el.value);
  return data;
}
document.querySelectorAll('.create-form').forEach(form => {
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const entity = form.closest('.section').dataset.entity;
    const r = await fetch(`/api/settings/${entity}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(rowData(form))});
    const j = await r.json();
    if(!j.ok) alert(j.error || 'Failed'); else location.reload();
  });
});
document.querySelectorAll('.save').forEach(btn => {
  btn.addEventListener('click', async () => {
    const section = btn.closest('.section');
    const row = btn.closest('tr');
    const r = await fetch(`/api/settings/${section.dataset.entity}/${row.dataset.id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(rowData(row))});
    const j = await r.json();
    if(!j.ok) alert(j.error || 'Failed'); else location.reload();
  });
});
document.querySelectorAll('.delete').forEach(btn => {
  btn.addEventListener('click', async () => {
    if(!confirm('Delete this item?')) return;
    const section = btn.closest('.section');
    const row = btn.closest('tr');
    const r = await fetch(`/api/settings/${section.dataset.entity}/${row.dataset.id}`, {method:'DELETE'});
    const j = await r.json();
    if(!j.ok) alert(j.error || 'Failed'); else location.reload();
  });
});
</script>
</body>
</html>
